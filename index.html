<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>패킹리스트 제작</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:#f5f6f8;color:#1a1a1a;min-height:100vh}
.header{background:#1a1a2e;padding:20px 32px;display:flex;align-items:center;gap:12px}
.header-logo{width:36px;height:36px;background:linear-gradient(135deg,#4f8ef7,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:16px}
.main{max-width:1100px;margin:0 auto;padding:28px 20px}
.form-card{background:#fff;border-radius:14px;border:1px solid #e8eaf0;padding:28px;margin-bottom:20px}
.form-card h2{font-size:15px;font-weight:600;color:#333;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.step-badge{background:#1a1a2e;color:#fff;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500}
.selector-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:18px}
.selector-group label{display:block;font-size:12px;color:#666;font-weight:500;margin-bottom:8px;letter-spacing:.3px}
.chip-list{display:flex;flex-wrap:wrap;gap:6px;min-height:36px}
.chip{padding:6px 12px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #dde1eb;background:#f8f9fc;color:#444;transition:all .15s;user-select:none;white-space:nowrap}
.chip:hover{border-color:#4f8ef7;color:#4f8ef7;background:#eef4ff}
.chip.selected{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.custom-input-row{display:flex;gap:8px;margin-top:8px}
.custom-input-row input{flex:1;padding:7px 12px;border:1px solid #dde1eb;border-radius:8px;font-size:13px;font-family:inherit;outline:none;color:#333}
.custom-input-row input:focus{border-color:#4f8ef7}
.custom-input-row button{padding:7px 14px;background:#4f8ef7;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;white-space:nowrap}
.custom-input-row button:hover{background:#3a7ee6}
.qty-row{display:flex;align-items:center;gap:12px;margin-top:6px}
.qty-row label{font-size:13px;color:#555;font-weight:500;white-space:nowrap}
.qty-control{display:flex;align-items:center;border:1px solid #dde1eb;border-radius:8px;overflow:hidden}
.qty-control button{width:32px;height:32px;border:none;background:#f5f6f8;cursor:pointer;font-size:16px;color:#444;transition:background .1s}
.qty-control button:hover{background:#e8eaf0}
.qty-control input{width:52px;height:32px;border:none;border-left:1px solid #dde1eb;border-right:1px solid #dde1eb;text-align:center;font-size:14px;font-weight:500;font-family:inherit;color:#1a1a2e;outline:none}
.match-preview{margin-top:12px;padding:10px 14px;background:#f0f7ff;border:1px solid #c7dff7;border-radius:8px;font-size:13px;color:#1a4a7a;display:none}
.match-preview.show{display:block}
.match-preview .match-code{font-weight:600;color:#1a1a2e}
.match-preview .no-match{color:#e05a2b}
.add-btn{width:100%;padding:12px;background:#1a1a2e;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .15s;margin-top:16px}
.add-btn:hover{background:#2d2d50}
.add-btn:active{transform:scale(.99)}
.summary-section{background:#fff;border-radius:14px;border:1px solid #e8eaf0;overflow:hidden}
.summary-header{padding:18px 24px;border-bottom:1px solid #e8eaf0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.summary-header h2{font-size:15px;font-weight:600;color:#333}
.count-badge{background:#eef4ff;color:#4f8ef7;font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px}
.action-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-outline{padding:7px 16px;border:1px solid #dde1eb;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#444;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px}
.btn-outline:hover{border-color:#4f8ef7;color:#4f8ef7}
.btn-danger-outline{padding:7px 16px;border:1px solid #fee2e2;background:#fff;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;color:#dc2626;font-weight:500;transition:all .15s}
.btn-danger-outline:hover{background:#fef2f2}
.btn-green{padding:7px 16px;border:none;background:#059669;color:#fff;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500;display:flex;align-items:center;gap:6px}
.btn-green:hover{background:#047857}
.list-table{width:100%;border-collapse:collapse}
.list-table th{background:#f8f9fc;font-size:12px;color:#888;font-weight:500;padding:10px 14px;text-align:left;border-bottom:1px solid #e8eaf0;white-space:nowrap}
.list-table td{padding:10px 14px;font-size:13px;color:#333;border-bottom:1px solid #f0f2f7;vertical-align:middle}
.list-table tr:last-child td{border-bottom:none}
.list-table tr:hover td{background:#fafbfd}
.tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:500}
.tag-code{background:#fff3e0;color:#e65100;font-family:monospace;font-size:11px}
.tag-barcode{background:#e8f5e9;color:#1b5e20;font-family:monospace;font-size:11px}
.tag-category{background:#eff6ff;color:#1d4ed8}
.tag-sub{background:#f0fdf4;color:#166534}
.tag-color{background:#faf5ff;color:#6b21a8}
.tag-size{background:#fff7ed;color:#9a3412}
.tag-nomatch{background:#fef2f2;color:#b91c1c;font-size:11px}
.del-btn{width:28px;height:28px;border:none;background:#fee2e2;color:#dc2626;border-radius:6px;cursor:pointer;font-size:13px;transition:background .15s;display:flex;align-items:center;justify-content:center}
.del-btn:hover{background:#fecaca}
.empty-state{padding:48px 24px;text-align:center;color:#aaa}
.empty-state p{font-size:14px;margin-top:12px}
.color-swatch{width:14px;height:14px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.12);vertical-align:middle;margin-right:4px}
.toast{position:fixed;bottom:28px;right:28px;background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:500;z-index:9999;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:600px){
  .selector-row{grid-template-columns:1fr}
  .main{padding:16px}
  .form-card{padding:18px}
  .list-table th:nth-child(1),.list-table td:nth-child(1),.list-table th:nth-child(2),.list-table td:nth-child(2){display:none}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">P</div>
  <div>
    <div style="color:#fff;font-size:18px;font-weight:600">패킹리스트 제작</div>
    <div style="color:#8899bb;font-size:12px;margin-top:2px">항목을 선택하고 패킹리스트를 만드세요</div>
  </div>
</div>

<div class="main">
  <div class="form-card">
    <h2><span class="step-badge">1</span> 항목 / 세부항목 선택</h2>
    <div class="selector-row">
      <div class="selector-group">
        <label>항목</label>
        <div class="chip-list" id="chips-category"></div>
        <div class="custom-input-row">
          <input type="text" id="custom-category" placeholder="직접 입력">
          <button onclick="addCustom('category')">추가</button>
        </div>
      </div>
      <div class="selector-group" id="sub-group" style="display:none">
        <label>세부항목</label>
        <div class="chip-list" id="chips-sub"></div>
        <div class="custom-input-row">
          <input type="text" id="custom-sub" placeholder="직접 입력">
          <button onclick="addCustom('sub')">추가</button>
        </div>
      </div>
    </div>

    <h2 style="margin-top:20px"><span class="step-badge">2</span> 색상 / 사이즈 선택</h2>
    <div class="selector-row">
      <div class="selector-group">
        <label>색상</label>
        <div class="chip-list" id="chips-color"></div>
        <div class="custom-input-row">
          <input type="text" id="custom-color" placeholder="직접 입력">
          <button onclick="addCustom('color')">추가</button>
        </div>
      </div>
      <div class="selector-group">
        <label>사이즈</label>
        <div class="chip-list" id="chips-size"></div>
        <div class="custom-input-row">
          <input type="text" id="custom-size" placeholder="직접 입력">
          <button onclick="addCustom('size')">추가</button>
        </div>
      </div>
    </div>

    <div class="match-preview" id="match-preview"></div>

    <h2 style="margin-top:20px"><span class="step-badge">3</span> 수량 입력</h2>
    <div class="qty-row">
      <label>수량</label>
      <div class="qty-control">
        <button onclick="changeQty(-1)">−</button>
        <input type="number" id="qty-input" value="1" min="1">
        <button onclick="changeQty(1)">+</button>
      </div>
    </div>

    <button class="add-btn" onclick="addItem()">+ 패킹리스트에 추가</button>
  </div>

  <div class="summary-section">
    <div class="summary-header">
      <div style="display:flex;align-items:center;gap:10px">
        <h2>패킹리스트</h2>
        <span class="count-badge" id="item-count">0건</span>
      </div>
      <div class="action-btns">
        <button class="btn-outline" onclick="exportCSV()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          CSV
        </button>
        <button class="btn-green" onclick="exportExcel()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          엑셀 다운로드
        </button>
        <button class="btn-danger-outline" onclick="clearAll()">전체 삭제</button>
      </div>
    </div>
    <div id="list-body">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg>
        <p>아직 추가된 항목이 없어요<br>위에서 항목을 선택하고 추가해보세요</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// ── DB 검색 ────────────────────────────────────────────────────
function normalize(s){ return (s||'').replace(/[\[\]\s\-]/g,'').toLowerCase(); }

function findInDB(category, sub, color, size){
  const results = [];
  for(const row of DB){
    const opt = normalize(row.option);
    const nm  = normalize(row.name);
    // 색상 매칭
    const colorMatch = color ? opt.includes(normalize(color)) : true;
    // 사이즈 매칭
    const sizeKey = size && size !== 'FREE' ? size.replace('"','인치') : null;
    const sizeMatch = sizeKey ? opt.includes(normalize(sizeKey)) : true;
    // 세부항목 매칭
    const subMatch = sub ? (opt.includes(normalize(sub)) || nm.includes(normalize(sub))) : true;
    // 항목 매칭 (상품명 포함)
    let catMatch = false;
    if(category === '캐리어') catMatch = nm.includes('캐리어');
    else if(category === '러닝상품') catMatch = nm.includes('러닝');
    else if(category === '바퀴커버') catMatch = nm.includes('바퀴커버');
    else if(category === '김똑똑') catMatch = nm.includes('김똑똑');
    else if(category === '똑똑떡뻥') catMatch = nm.includes('똑똑떡뻥');
    else if(category === '네임택') catMatch = nm.includes('네임택');
    else if(category === '백백') catMatch = nm.includes('롤링프레스') || nm.includes('백팩');
    else if(category === '리츠 레디백') catMatch = nm.includes('리츠레디백') || nm.includes('리츠 레디백');
    else catMatch = nm.includes(normalize(category));
    if(catMatch && colorMatch && sizeMatch && subMatch) results.push(row);
  }
  return results;
}

function updateMatchPreview(){
  const preview = document.getElementById('match-preview');
  if(!sel.category){ preview.className='match-preview'; return; }
  const matches = findInDB(sel.category, sel.sub, sel.color, sel.size);
  preview.className = 'match-preview show';
  if(matches.length === 0){
    preview.innerHTML = '<span class="no-match">⚠ 상품DB에서 일치하는 항목을 찾지 못했습니다. 추가는 가능하지만 상품코드/바코드가 비어있게 됩니다.</span>';
  } else if(matches.length === 1){
    preview.innerHTML = `✓ 일치 상품 — <span class="match-code">${matches[0].code}</span> | ${matches[0].name} ${matches[0].option} | 바코드: <span class="match-code">${matches[0].barcode}</span>`;
  } else {
    preview.innerHTML = `✓ ${matches.length}개 일치 — ${matches.slice(0,3).map(m=>`<span class="match-code">${m.code}</span>`).join(', ')}${matches.length>3?' …':''}`;
  }
}

// ── 렌더링 ─────────────────────────────────────────────────────
function init(){
  renderChips('category', DATA.categories.concat(customOpts.category), 'category');
  renderChips('color', DATA.colors.concat(customOpts.color), 'color');
}

function renderChips(type, opts, key){
  const el = document.getElementById('chips-'+type);
  if(!el) return;
  el.innerHTML = '';
  opts.forEach(opt=>{
    const c = document.createElement('div');
    c.className = 'chip' + (sel[key]===opt?' selected':'');
    if(type==='color'){
      const bg = colorMap[opt];
      const sw = document.createElement('span');
      sw.className='color-swatch';
      if(bg) sw.style.background=bg;
      c.appendChild(sw);
    }
    c.appendChild(document.createTextNode(opt));
    c.onclick = ()=>selectChip(key, opt);
    el.appendChild(c);
  });
}

function selectChip(key, val){
  sel[key] = sel[key]===val ? '' : val;
  if(key==='category'){ sel.sub=''; sel.size=''; updateSubGroup(); updateSizes(); }
  if(key==='sub') updateSizes();
  refreshAll();
  updateMatchPreview();
}

function updateSubGroup(){
  const sg = document.getElementById('sub-group');
  const cat = sel.category;
  if(!cat || DATA.subs[cat]===null){ sg.style.display='none'; sel.sub=''; return; }
  const subs = (DATA.subs[cat]||[]).concat(customOpts.sub[cat]||[]);
  if(!subs.length){ sg.style.display='none'; return; }
  sg.style.display='block';
  renderChips('sub', subs, 'sub');
}

function updateSizes(){
  const cat = sel.category;
  const sizes = (DATA.sizes[cat]||['FREE']).concat(customOpts.size[cat]||[]);
  renderChips('size', sizes, 'size');
  if(sizes.length===1) sel.size=sizes[0];
}

function refreshAll(){
  renderChips('category', DATA.categories.concat(customOpts.category), 'category');
  updateSubGroup();
  renderChips('color', DATA.colors.concat(customOpts.color), 'color');
  const cat = sel.category;
  const sizes = (DATA.sizes[cat]||['FREE']).concat(customOpts.size[cat]||[]);
  renderChips('size', sizes, 'size');
}

function addCustom(type){
  const inp = document.getElementById('custom-'+type);
  const val = inp.value.trim(); if(!val) return;
  if(type==='category'){ if(!customOpts.category.includes(val)) customOpts.category.push(val); }
  else if(type==='sub'){ const cat=sel.category||'_'; if(!customOpts.sub[cat]) customOpts.sub[cat]=[]; if(!customOpts.sub[cat].includes(val)) customOpts.sub[cat].push(val); }
  else if(type==='color'){ if(!customOpts.color.includes(val)) customOpts.color.push(val); }
  else if(type==='size'){ const cat=sel.category||'_'; if(!customOpts.size[cat]) customOpts.size[cat]=[]; if(!customOpts.size[cat].includes(val)) customOpts.size[cat].push(val); }
  inp.value=''; sel[type]=val; refreshAll(); updateMatchPreview();
}

function changeQty(d){
  const inp=document.getElementById('qty-input');
  inp.value=Math.max(1,parseInt(inp.value||1)+d);
}

function addItem(){
  if(!sel.category){showToast('항목을 선택해주세요');return;}
  const cat=sel.category;
  const needSub=DATA.subs[cat]!==null&&(DATA.subs[cat]||[]).length>0;
  if(needSub&&!sel.sub){showToast('세부항목을 선택해주세요');return;}
  if(!sel.color){showToast('색상을 선택해주세요');return;}
  if(!sel.size){showToast('사이즈를 선택해주세요');return;}
  const qty=parseInt(document.getElementById('qty-input').value)||1;
  const matches=findInDB(cat,sel.sub,sel.color,sel.size);
  let code='', barcode='';
  if(matches.length>=1){ code=matches[0].code; barcode=matches[0].barcode; }
  items.push({id:++idCounter, code, barcode, category:cat, sub:sel.sub||'-', color:sel.color, size:sel.size, qty});
  renderList();
  showToast('추가되었습니다 ✓');
}

function deleteItem(id){ items=items.filter(i=>i.id!==id); renderList(); }
function clearAll(){ if(!items.length) return; if(confirm('전체 항목을 삭제할까요?')){items=[];renderList();} }

function renderList(){
  document.getElementById('item-count').textContent=items.length+'건';
  const body=document.getElementById('list-body');
  if(!items.length){
    body.innerHTML='<div class="empty-state"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 13h4"/></svg><p>아직 추가된 항목이 없어요<br>위에서 항목을 선택하고 추가해보세요</p></div>';
    return;
  }
  let html='<table class="list-table"><thead><tr><th>상품코드</th><th>바코드</th><th>#</th><th>항목</th><th>세부항목</th><th>색상</th><th>사이즈</th><th>수량</th><th></th></tr></thead><tbody>';
  items.forEach((it,i)=>{
    const sw=colorMap[it.color];
    const swStyle=sw?(sw.includes('gradient')?`background:${sw}`:`background:${sw}`):'background:#eee';
    html+=`<tr>
      <td>${it.code?`<span class="tag tag-code">${it.code}</span>`:'<span class="tag tag-nomatch">미매칭</span>'}</td>
      <td>${it.barcode?`<span class="tag tag-barcode">${it.barcode}</span>`:'<span style="color:#bbb">-</span>'}</td>
      <td style="color:#aaa;font-size:12px">${i+1}</td>
      <td><span class="tag tag-category">${it.category}</span></td>
      <td>${it.sub!=='-'?`<span class="tag tag-sub">${it.sub}</span>`:'<span style="color:#bbb">-</span>'}</td>
      <td><span class="color-swatch" style="${swStyle}"></span><span class="tag tag-color">${it.color}</span></td>
      <td><span class="tag tag-size">${it.size}</span></td>
      <td style="font-weight:600;color:#1a1a2e">${it.qty}</td>
      <td><button class="del-btn" onclick="deleteItem(${it.id})">✕</button></td>
    </tr>`;
  });
  html+='</tbody></table>';
  body.innerHTML=html;
}

function exportCSV(){
  if(!items.length){showToast('항목을 먼저 추가해주세요');return;}
  const header='상품코드,바코드,번호,항목,세부항목,색상,사이즈,수량\n';
  const rows=items.map((it,i)=>`${it.code},${it.barcode},${i+1},${it.category},${it.sub},${it.color},${it.size},${it.qty}`).join('\n');
  const blob=new Blob(['\uFEFF'+header+rows],{type:'text/csv;charset=utf-8'});
  dlBlob(blob,'패킹리스트.csv');
  showToast('CSV 다운로드 완료');
}

function exportExcel(){
  if(!items.length){showToast('항목을 먼저 추가해주세요');return;}
  const ws_data=[['상품코드','바코드','번호','항목','세부항목','색상','사이즈','수량']];
  items.forEach((it,i)=>ws_data.push([it.code,it.barcode,i+1,it.category,it.sub,it.color,it.size,it.qty]));
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(ws_data);
  ws['!cols']=[{wch:12},{wch:20},{wch:5},{wch:14},{wch:16},{wch:12},{wch:8},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws,'패킹리스트');
  XLSX.writeFile(wb,'패킹리스트.xlsx');
  showToast('엑셀 다운로드 완료');
}

function dlBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

init();
</script>
</body>
</html>
